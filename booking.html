    <main>
        <h2>  Ku,soo Biir Xarunteena</h2>
        <p class="subtitle">Buuxi foomkan si aad iskugu biirto xarunta barashada luuqadaha.</p>

        <form>
            <fieldset>
                <legend>Macluumaadka Ardayga</legend>

                <label for="name">Magac:</label>
                <input type="text" id="name" name="name" placeholder="Magacaga Buuxa" required>

                <label for="major">Luuqadda aad rabto:</label>
                <select id="major" name="major" required>
                    <option value="">-- Dooro Luuqad --</option>
                    <option value="english"> English (Ingiriis)</option>
                    <option value="somali"> Somali (Soomaali)</option>
                    <option value="arabic"> Arabic (Carabi)</option>
                    <option value="french"> Faransiis</option>
                    <option value="spanish"> Isbaanish</option>
                </select>

                <label>Jinsiga:</label>
                <label><input type="radio" name="gender" value="male" required> lab</label>
                <label><input type="radio" name="gender" value="female"> Dhedig</label>

                <label>Higaanta (Waxaad jeceshahay):</label>
                <label><input type="checkbox" name="hobby" value="reading">  Akhriska</label>
                <label><input type="checkbox" name="hobby" value="writing">  ciyaaraha</label>
                <label><input type="checkbox" name="hobby" value="speaking">  Games-ka</label>
                <label><input type="checkbox" name="hobby" value="listening">  dawashda Tv</label>

                <label for="comments">Faallo:</label>
                <textarea id="comments" name="comments" placeholder="Faallo ku saabsan xarunta ama luuqadda aad rabto..."></textarea>

                <button type="submit" class="btn"> Submit</button>
            </fieldset>
        </form>
    </main>
